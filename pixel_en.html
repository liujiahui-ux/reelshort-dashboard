<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReelShort Pixel 数据看板 (EN)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f6fa;color:#1a1a2e;font-size:13px}
.header{background:#fff;padding:16px 24px;border-bottom:1px solid #e2e5ed;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:18px;color:#1a1a2e;font-weight:600}
.header .meta{color:#8c8fa3;font-size:12px}
.filters{background:#fff;padding:12px 24px;border-bottom:1px solid #e2e5ed;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.filter-group{display:flex;align-items:center;gap:6px}
.filter-group label{color:#6b7194;font-size:12px;white-space:nowrap}
.filter-group select{background:#fff;color:#1a1a2e;border:1px solid #d1d5e4;border-radius:6px;padding:5px 8px;font-size:12px;cursor:pointer;min-width:120px}
.filter-group select:focus{outline:none;border-color:#5b8def}
.search-box{background:#fff;color:#1a1a2e;border:1px solid #d1d5e4;border-radius:6px;padding:5px 10px;font-size:12px;width:200px}
.search-box:focus{outline:none;border-color:#5b8def}
.toggle-group{display:flex;gap:4px}
.toggle-btn{background:#f0f1f5;color:#6b7194;border:1px solid #d1d5e4;border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;transition:all .2s}
.toggle-btn.active{background:#5b8def;color:#fff;border-color:#5b8def}
.table-wrap{overflow-x:auto;padding:0 12px 12px}
table{width:100%;border-collapse:collapse;margin-top:8px}
thead th{background:#f8f9fc;color:#6b7194;font-size:11px;font-weight:500;padding:8px 10px;text-align:right;position:sticky;top:0;z-index:2;cursor:pointer;white-space:nowrap;border-bottom:2px solid #e2e5ed;user-select:none}
thead th:hover{color:#1a1a2e;background:#eef0f6}
thead th.sort-asc::after{content:" ▲";color:#5b8def}
thead th.sort-desc::after{content:" ▼";color:#5b8def}
thead th:nth-child(-n+3){text-align:left}
tbody tr{border-bottom:1px solid #f0f1f5;transition:background .15s}
tbody tr:hover{background:#f0f4ff}
tbody tr.subtotal-row{background:#eef2fb;font-weight:600;border-top:2px solid #d1d5e4}
tbody td{padding:7px 10px;text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
tbody td:nth-child(-n+3){text-align:left}
.plat-tag{display:inline-block;padding:2px 6px;border-radius:3px;font-size:10px;font-weight:600;text-transform:uppercase}
.plat-fb{background:#e7f0ff;color:#1877f2}
.plat-tt{background:#fff0f3;color:#e1234b}
.roas-high{color:#16a34a}
.roas-mid{color:#d97706}
.roas-low{color:#dc2626}
.pixel-name{font-family:"SF Mono",Consolas,monospace;font-size:11px;color:#4a5078;max-width:320px;overflow:hidden;text-overflow:ellipsis}
.drama-name{font-size:12px;color:#4a5078;max-width:260px;overflow:hidden;text-overflow:ellipsis}
.no-data{color:#8c8fa3;text-align:center;padding:40px;font-size:14px}
.footer{text-align:center;padding:16px;color:#8c8fa3;font-size:11px;border-top:1px solid #e2e5ed}

/* Summary cards */
.summary-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;padding:12px 24px}
.summary-card{background:#fff;border-radius:8px;padding:12px 16px;border:1px solid #e2e5ed}
.summary-card .card-label{color:#8c8fa3;font-size:11px;margin-bottom:4px}
.summary-card .card-value{color:#1a1a2e;font-size:20px;font-weight:700}
.summary-card .card-sub{color:#8c8fa3;font-size:11px;margin-top:2px}
</style>
</head>
<body>

<!-- Password Gate -->
<div id="authGate" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#f5f6fa;z-index:99999;display:flex;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:12px;padding:32px;box-shadow:0 8px 32px rgba(0,0,0,.12);width:340px;text-align:center">
    <h2 style="color:#1a1a2e;margin-bottom:8px;font-size:18px">Pixel Dashboard</h2>
    <p style="color:#8c8fa3;font-size:12px;margin-bottom:20px">Enter password to access</p>
    <input type="password" id="authPwd" placeholder="Password" style="width:100%;padding:10px 14px;border:1px solid #d1d5e4;border-radius:8px;font-size:14px;margin-bottom:12px;outline:none;color:#1a1a2e" onkeydown="if(event.key==='Enter')checkAuth()">
    <button onclick="checkAuth()" style="width:100%;padding:10px;background:#5b8def;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer">Enter</button>
    <div id="authErr" style="color:#e74c3c;font-size:12px;margin-top:8px;display:none">Wrong password</div>
  </div>
</div>
<script>
var AUTH_HASH='422b001755ba65be675a903348d7450b7ac2558eaf5f15df7956cf7616d92217';
async function sha256(s){var buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('')}
async function checkAuth(){var p=document.getElementById('authPwd').value;var h=await sha256(p);if(h===AUTH_HASH){sessionStorage.setItem('px_auth','1');document.getElementById('authGate').style.display='none'}else{document.getElementById('authErr').style.display='block';document.getElementById('authPwd').value=''}}
if(sessionStorage.getItem('px_auth')==='1'){document.getElementById('authGate').style.display='none'}
</script>

<div class="header">
  <div>
    <h1>Pixel 数据看板 (English)</h1>
    <div class="meta" id="metaInfo">加载中...</div>
  </div>
  <div style="display:flex;gap:12px;align-items:center">
    <a href="recovery.html" style="color:#5b8def;font-size:12px;text-decoration:none">恢复投放 →</a>
  </div>
</div>

<div class="summary-cards" id="summaryCards"></div>

<div class="filters">
  <div class="filter-group">
    <label>平台</label>
    <select id="filterPlat">
      <option value="">全部</option>
      <option value="fb">Facebook</option>
      <option value="tt">TikTok</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Pixel</label>
    <select id="filterPixel"><option value="">全部</option></select>
  </div>
  <div class="filter-group">
    <label>Drama</label>
    <select id="filterDrama"><option value="">全部</option></select>
  </div>
  <div class="filter-group">
    <label>搜索</label>
    <input type="text" class="search-box" id="searchBox" placeholder="Search pixel / drama...">
  </div>
  <div class="filter-group">
    <label>显示</label>
    <div class="toggle-group">
      <button class="toggle-btn active" data-show="drama" onclick="toggleView(this)">Drama Detail</button>
      <button class="toggle-btn" data-show="pixel" onclick="toggleView(this)">Pixel Summary</button>
    </div>
  </div>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr id="tableHead"></tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div class="no-data" id="noData" style="display:none">没有匹配的数据</div>
</div>

<div class="footer">
  ReelShort UA · Pixel 数据看板 (English) · 数据来源：投放分析报表
</div>

<script>document.write('<scr'+'ipt src="pixel_data.js?v='+Date.now()+'"></scr'+'ipt>');</script>
<script>
// ===== Config =====
var COLS = [
  {key:'plat', label:'Platform', align:'left', type:'platform'},
  {key:'pixel', label:'Pixel Name', align:'left', type:'pixel'},
  {key:'drama_en', label:'Drama', align:'left', type:'drama'},
  {key:'spend', label:'Spend($)', align:'right', type:'money'},
  {key:'d0_roas', label:'D0 ROAS', align:'right', type:'percent'},
  {key:'d0_revenue', label:'D0 Revenue($)', align:'right', type:'money'},
  {key:'cpm', label:'CPM($)', align:'right', type:'decimal'},
  {key:'activations', label:'Activations', align:'right', type:'int'},
  {key:'paying_users', label:'Paying Users', align:'right', type:'int'},
  {key:'cpi', label:'CPI($)', align:'right', type:'decimal'},
  {key:'payment_rate', label:'Pay Rate', align:'right', type:'percent'},
  {key:'arppu', label:'ARPPU($)', align:'right', type:'decimal'},
  {key:'new_ratio', label:'New User %', align:'right', type:'percent'},
  {key:'old_ratio', label:'Old User %', align:'right', type:'percent'}
];

// ===== Data Processing =====
var DATA = [];
var currentSort = {col: 'spend', dir: 'desc'};
var currentView = 'drama';

function init() {
  if (typeof PIXEL_RAW === 'undefined') {
    document.getElementById('noData').style.display = 'block';
    document.getElementById('noData').textContent = '数据文件加载失败，请检查 pixel_data.js';
    return;
  }

  // Parse raw data — new format with drama fields, filter English only, exclude lang subtotals
  DATA = [];
  PIXEL_RAW.forEach(function(r) {
    if (r[0] === '英语' && r[2] !== '_subtotal') {
      DATA.push({
        lang: r[0],
        plat: r[1],
        pixel: r[2],
        drama_cn: r[3],
        drama_en: r[4],
        spend: r[5],
        d0_roas: r[6],
        d0_revenue: r[7],
        cpm: r[8],
        activations: r[9],
        paying_users: r[10],
        cpi: r[11],
        payment_rate: r[12],
        arppu: r[13],
        new_ratio: r[14],
        old_ratio: r[15],
        is_pixel_subtotal: r[3] === '_subtotal',
        is_drama: r[3] !== '_subtotal'
      });
    }
  });

  // Meta info
  if (typeof PIXEL_META !== 'undefined') {
    document.getElementById('metaInfo').textContent = 'Updated: ' + PIXEL_META.update + ' · ' + (PIXEL_META.source || '') + ' · English only';
  }

  populateFilters();
  buildHeader();
  renderSummary();
  renderTable();
}

function populateFilters() {
  var pixels = {};
  var dramas = {};
  DATA.forEach(function(d) {
    if (d.pixel) pixels[d.pixel] = 1;
    if (d.is_drama && d.drama_en) dramas[d.drama_en] = 1;
  });

  var pixelSel = document.getElementById('filterPixel');
  Object.keys(pixels).sort().forEach(function(p) {
    var o = document.createElement('option');
    o.value = p; o.textContent = p;
    pixelSel.appendChild(o);
  });

  var dramaSel = document.getElementById('filterDrama');
  Object.keys(dramas).sort().forEach(function(d) {
    var o = document.createElement('option');
    o.value = d; o.textContent = d;
    dramaSel.appendChild(o);
  });

  // Events
  pixelSel.onchange = dramaSel.onchange = document.getElementById('filterPlat').onchange = function(){ renderTable(); renderSummary(); };
  document.getElementById('searchBox').oninput = function(){ renderTable(); };
}

function buildHeader() {
  var tr = document.getElementById('tableHead');
  tr.innerHTML = '';
  COLS.forEach(function(c) {
    var th = document.createElement('th');
    th.textContent = c.label;
    th.dataset.col = c.key;
    if (c.align === 'left') th.style.textAlign = 'left';
    if (currentSort.col === c.key) th.className = 'sort-' + currentSort.dir;
    th.onclick = function() { sortBy(c.key); };
    tr.appendChild(th);
  });
}

function getFilteredData() {
  var plat = document.getElementById('filterPlat').value;
  var pixel = document.getElementById('filterPixel').value;
  var drama = document.getElementById('filterDrama').value;
  var search = document.getElementById('searchBox').value.toLowerCase();

  return DATA.filter(function(d) {
    // View filter
    if (currentView === 'drama') {
      // Show drama rows + pixel subtotals
    } else if (currentView === 'pixel') {
      if (!d.is_pixel_subtotal) return false;
    }

    if (plat && d.plat !== plat) return false;
    if (pixel && d.pixel !== pixel) return false;
    if (drama && d.is_pixel_subtotal) return false;
    if (drama && d.is_drama && d.drama_en !== drama) return false;

    if (search) {
      var haystack = ((d.pixel || '') + ' ' + (d.drama_en || '')).toLowerCase();
      if (haystack.indexOf(search) === -1) return false;
    }
    return true;
  });
}

function renderSummary() {
  var plat = document.getElementById('filterPlat').value;
  var pixel = document.getElementById('filterPixel').value;

  var summaryData = DATA.filter(function(d) {
    if (!d.is_pixel_subtotal) return false;
    if (plat && d.plat !== plat) return false;
    if (pixel && d.pixel !== pixel) return false;
    return true;
  });

  var totalSpend = 0, totalRevenue = 0, totalActivations = 0, totalPaying = 0;

  summaryData.forEach(function(d) {
    totalSpend += (d.spend || 0);
    totalRevenue += (d.d0_revenue || 0);
    totalActivations += (d.activations || 0);
    totalPaying += (d.paying_users || 0);
  });

  var avgRoas = totalSpend > 0 ? (totalRevenue / totalSpend) : 0;
  var avgPayRate = totalActivations > 0 ? (totalPaying / totalActivations) : 0;

  var cards = [
    {label: 'Pixels', value: summaryData.length, sub: 'English only'},
    {label: 'Total Spend', value: '$' + formatNum(totalSpend), sub: ''},
    {label: 'D0 Revenue', value: '$' + formatNum(totalRevenue), sub: ''},
    {label: 'Weighted D0 ROAS', value: (avgRoas * 100).toFixed(2) + '%', sub: 'spend-weighted'},
    {label: 'Activations', value: formatInt(totalActivations), sub: ''},
    {label: 'Paying Users', value: formatInt(totalPaying), sub: 'Pay rate ' + (avgPayRate * 100).toFixed(2) + '%'}
  ];

  var html = '';
  cards.forEach(function(c) {
    html += '<div class="summary-card"><div class="card-label">' + c.label + '</div><div class="card-value">' + c.value + '</div><div class="card-sub">' + c.sub + '</div></div>';
  });
  document.getElementById('summaryCards').innerHTML = html;
}

function renderTable() {
  var filtered = getFilteredData();

  if (currentView === 'drama') {
    // Group by pixel, sort groups, sort within groups
    var groups = {};
    var groupOrder = [];
    filtered.forEach(function(d) {
      var gk = d.plat + '|' + d.pixel;
      if (!groups[gk]) { groups[gk] = {dramas:[], subtotal:null}; groupOrder.push(gk); }
      if (d.is_pixel_subtotal) groups[gk].subtotal = d;
      else groups[gk].dramas.push(d);
    });

    groupOrder.sort(function(a, b) {
      var sa = groups[a].subtotal, sb = groups[b].subtotal;
      var va = sa ? sa[currentSort.col] : null;
      var vb = sb ? sb[currentSort.col] : null;
      if (va == null) va = -Infinity;
      if (vb == null) vb = -Infinity;
      if (typeof va === 'string') return currentSort.dir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
      return currentSort.dir === 'asc' ? va - vb : vb - va;
    });

    groupOrder.forEach(function(gk) {
      groups[gk].dramas.sort(function(a, b) {
        var va = a[currentSort.col], vb = b[currentSort.col];
        if (va == null) va = -Infinity;
        if (vb == null) vb = -Infinity;
        if (typeof va === 'string') return currentSort.dir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
        return currentSort.dir === 'asc' ? va - vb : vb - va;
      });
    });

    filtered = [];
    groupOrder.forEach(function(gk) {
      filtered = filtered.concat(groups[gk].dramas);
      if (groups[gk].subtotal) filtered.push(groups[gk].subtotal);
    });
  } else {
    filtered.sort(function(a, b) {
      var va = a[currentSort.col], vb = b[currentSort.col];
      if (va == null) va = -Infinity;
      if (vb == null) vb = -Infinity;
      if (typeof va === 'string') return currentSort.dir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
      return currentSort.dir === 'asc' ? va - vb : vb - va;
    });
  }

  var tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';

  if (filtered.length === 0) {
    document.getElementById('noData').style.display = 'block';
    return;
  }
  document.getElementById('noData').style.display = 'none';

  filtered.forEach(function(d) {
    var tr = document.createElement('tr');
    if (d.is_pixel_subtotal) tr.className = 'subtotal-row';

    COLS.forEach(function(c) {
      var td = document.createElement('td');
      var v = d[c.key];

      if (c.type === 'platform') {
        if (v === 'fb') td.innerHTML = '<span class="plat-tag plat-fb">FB</span>';
        else if (v === 'tt') td.innerHTML = '<span class="plat-tag plat-tt">TT</span>';
        else td.textContent = v || '-';
      } else if (c.type === 'pixel') {
        td.className = 'pixel-name';
        td.textContent = v || '-';
        td.title = v || '';
      } else if (c.type === 'drama') {
        td.className = 'drama-name';
        if (d.is_pixel_subtotal) {
          td.textContent = '▸ Pixel Subtotal';
          td.style.fontWeight = '600';
          td.style.color = '#5b8def';
        } else {
          td.textContent = v || '-';
          td.title = v || '';
        }
      } else if (c.type === 'percent') {
        if (v != null) {
          var pct = (v * 100).toFixed(2) + '%';
          if (c.key === 'd0_roas') {
            var cls = v >= 0.30 ? 'roas-high' : (v >= 0.20 ? 'roas-mid' : 'roas-low');
            td.innerHTML = '<span class="' + cls + '">' + pct + '</span>';
          } else {
            td.textContent = pct;
          }
        } else {
          td.textContent = '-';
          td.style.color = '#b0b3c6';
        }
      } else if (c.type === 'money') {
        td.textContent = v != null ? '$' + formatNum(v) : '-';
        if (v == null) td.style.color = '#b0b3c6';
      } else if (c.type === 'int') {
        td.textContent = v != null ? formatInt(v) : '-';
        if (v == null) td.style.color = '#b0b3c6';
      } else if (c.type === 'decimal') {
        td.textContent = v != null ? v.toFixed(2) : '-';
        if (v == null) td.style.color = '#b0b3c6';
      } else {
        td.textContent = v || '-';
      }

      if (c.align === 'left') td.style.textAlign = 'left';
      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });
}

function sortBy(col) {
  if (currentSort.col === col) {
    currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
  } else {
    currentSort.col = col;
    currentSort.dir = 'desc';
  }
  buildHeader();
  renderTable();
}

function toggleView(btn) {
  document.querySelectorAll('.toggle-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  currentView = btn.dataset.show;
  renderTable();
  renderSummary();
}

// ===== Helpers =====
function formatNum(n) {
  if (n == null) return '-';
  if (n >= 1000000) return (n / 1000000).toFixed(2) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return n.toFixed(2);
}

function formatInt(n) {
  if (n == null) return '-';
  return n.toLocaleString();
}

// Init
window.onload = init;
</script>
</body>
</html>
